components:
  schemas:
    ActionTypeEnum:
      enum:
      - CREATE
      - UPDATE
      - ASSIGN
      - RETURN
      - REPAIR
      - DISPOSE
      type: string
      description: |-
        * `CREATE` - Create
        * `UPDATE` - Update
        * `ASSIGN` - Assign
        * `RETURN` - Return
        * `REPAIR` - Repair
        * `DISPOSE` - Dispose
    AssetType:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 16
        label:
          type: string
          maxLength: 64
        is_consumable:
          type: boolean
        is_active:
          type: boolean
      required:
      - code
      - id
      - label
    BlankEnum:
      enum:
      - ''
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        is_consumable:
          type: boolean
      required:
      - id
      - name
    ConsumableStock:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        item:
          type: integer
        initial_quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        min_threshold:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        reorder_alert_enabled:
          type: boolean
        unit:
          type: string
          maxLength: 32
        stock_status:
          type: string
          readOnly: true
      required:
      - id
      - item
      - stock_status
    ConsumableStockTransaction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        stock:
          type: integer
        transaction_type:
          $ref: '#/components/schemas/TransactionTypeEnum'
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        balance_after:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        status:
          type: string
          maxLength: 32
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        assigned_to:
          type: integer
          nullable: true
        department:
          type: string
          maxLength: 128
        description:
          type: string
        image:
          type: string
          format: uri
          nullable: true
        performed_by:
          type: integer
          readOnly: true
          nullable: true
        item_name:
          type: string
          readOnly: true
        item_number:
          type: string
          readOnly: true
        performed_by_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - balance_after
      - created_at
      - id
      - item_name
      - item_number
      - performed_by
      - performed_by_name
      - quantity
      - stock
      - transaction_type
    CustomFieldDefinition:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
