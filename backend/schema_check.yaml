openapi: 3.0.3
info:
  title: IMS API
  version: 1.0.0
  description: Inventory Management System API
paths:
  /api/asset-types/:
    get:
      operationId: asset_types_list
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: is_consumable
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - asset-types
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssetTypeList'
          description: ''
  /api/asset-types/{id}/:
    get:
      operationId: asset_types_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this asset type.
        required: true
      tags:
      - asset-types
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetType'
          description: ''
  /api/audit-logs/:
    get:
      operationId: audit_logs_list
      parameters:
      - in: query
        name: action_type
        schema:
          type: string
          enum:
          - ASSIGN
          - CREATE
          - DISPOSE
          - REPAIR
          - RETURN
          - UPDATE
        description: |-
          * `CREATE` - Create
          * `UPDATE` - Update
          * `ASSIGN` - Assign
          * `RETURN` - Return
          * `REPAIR` - Repair
          * `DISPOSE` - Dispose
      - in: query
        name: item
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: performed_by
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
